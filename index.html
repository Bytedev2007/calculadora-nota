<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Calculadora de Nota</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  background: #1c1c1c;
  padding: 35px;
  border-radius: 15px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  text-align: center;
}

h1 {
  margin-bottom: 20px;
  color: #00e5ff;
  font-size: 22px;
}

.input-group {
  text-align: left;
  margin-bottom: 15px;
}

label {
  font-size: 14px;
  color: #bbb;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
  outline: none;
  background: #2b2b2b;
  color: white;
  font-size: 16px;
  transition: 0.2s;
}

input:focus {
  border: 1px solid #00e5ff;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #00e5ff;
  color: #000;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.2s;
}

button:hover {
  background: #00bcd4;
}

.resultado {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  font-size: 18px;
  font-weight: bold;
  background: #2b2b2b;
}

.passou {
  color: #4caf50;
}

.impossivel {
  color: #f44336;
}

.normal {
  color: #00e5ff;
}

</style>
</head>

<body>

<div class="container">
  <h1>📊 Nota necessária</h1>

  <div class="input-group">
    <label>Qualitativa</label>
    <input type="number" id="qualitativa" placeholder="Ex: 10">
  </div>

  <div class="input-group">
    <label>VA</label>
    <input type="number" id="va" placeholder="Ex: 4.5">
  </div>

  <button onclick="calcular()">Calcular</button>

  <div id="resultado" class="resultado">Digite suas notas 👆</div>
</div>

<script>
function calcular() {
  let q = parseFloat(document.getElementById("qualitativa").value);
  let va = parseFloat(document.getElementById("va").value);
  let res = document.getElementById("resultado");

  if (isNaN(q) || isNaN(va)) {
    res.innerText = "Preenche tudo aí 😑";
    res.className = "resultado impossivel";
    return;
  }

  let pb = (600 - (q * 30) - (va * 35)) / 35;

  if (pb <= 0) {
    res.innerText = "🔥 Não está de Rec!";
    res.className = "resultado passou";
  } else if (pb > 10) {
    res.innerText = "💀 Impossível ";
    res.className = "resultado impossivel";
  } else {
    res.innerText = "Precisa tirar: " + pb.toFixed(2);
    res.className = "resultado normal";
  }
}
</script>

</body>
</html>
